<!DOCTYPE html>
<html>
<head><title>Generate Fibonacci Icons</title></head>
<body>
<p>Right-click each canvas and "Save image as" to the icons/ folder, or use the download links below.</p>
<div id="out"></div>
<script>
const sizes = [16, 48, 128];
const out = document.getElementById("out");

sizes.forEach(size => {
  const canvas = document.createElement("canvas");
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext("2d");

  // Background circle
  ctx.fillStyle = "#1a1a2e";
  ctx.beginPath();
  ctx.arc(size/2, size/2, size/2, 0, Math.PI*2);
  ctx.fill();

  // Golden spiral
  ctx.strokeStyle = "#c9a84c";
  ctx.lineWidth = Math.max(1, size / 16);
  ctx.lineCap = "round";

  const cx = size * 0.45, cy = size * 0.52;
  const s = size * 0.012;
  const fibs = [1,1,2,3,5,8,13];
  let x = cx, y = cy;

  for (let i = 0; i < fibs.length; i++) {
    const r = fibs[i] * s;
    const mod = i % 4;
    let ax, ay, sa, ea;
    if (mod === 0) { ax=x; ay=y+r; sa=-Math.PI/2; ea=0; x+=r; y+=r; }
    else if (mod === 1) { ax=x; ay=y; sa=0; ea=Math.PI/2; x-=fibs[i]*s; y+=r; }
    else if (mod === 2) { ax=x+r; ay=y; sa=Math.PI/2; ea=Math.PI; x-=0; y-=r; }
    else { ax=x+r; ay=y+r; sa=Math.PI; ea=3*Math.PI/2; x+=r; y-=r; }
    ctx.beginPath();
    ctx.arc(ax, ay, r, sa, ea);
    ctx.stroke();
  }

  // "φ" symbol
  if (size >= 48) {
    ctx.fillStyle = "#c9a84c";
    ctx.font = `bold ${size*0.28}px serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("φ", size*0.68, size*0.35);
  }

  const label = document.createElement("div");
  label.innerHTML = `<h3>icon${size}.png</h3>`;
  label.appendChild(canvas);
  const link = document.createElement("a");
  link.download = `icon${size}.png`;
  link.href = canvas.toDataURL("image/png");
  link.textContent = ` Download icon${size}.png`;
  label.appendChild(link);
  out.appendChild(label);
});
</script>
</body>
</html>
